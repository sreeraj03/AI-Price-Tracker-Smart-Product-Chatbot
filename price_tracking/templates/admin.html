<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-6">Admin Panel</h1>

<form action="/add-product" method="post" class="grid grid-cols-2 gap-3 mb-6">
<input name="name" placeholder="Product Name" class="border p-2">
<input name="category" placeholder="Category" class="border p-2">
<input name="price" placeholder="Price" class="border p-2">
<input name="discount" placeholder="Discount %" class="border p-2">
<input name="rating" placeholder="Rating" class="border p-2">
<input name="location" placeholder="Location" class="border p-2">
<input name="platform" placeholder="Platform" class="border p-2">
<button class="bg-green-500 text-white p-2 rounded col-span-2">
Add Product
</button>
</form>

<table class="min-w-full border text-sm bg-white">
<thead class="bg-gray-200">
<tr>
<th class="p-2 border">Name</th>
<th class="p-2 border">Location</th>
<th class="p-2 border">Platform</th>
<th class="p-2 border">Delete</th>
</tr>
</thead>
<tbody>
{% for p in products %}
<tr>
<td class="border p-2">{{p.Product_Name}}</td>
<td class="border p-2">{{p.Location}}</td>
<td class="border p-2">{{p.Platform}}</td>
<td class="border p-2">
<form action="/delete-product" method="post">
<input type="hidden" name="name" value="{{p.Product_Name}}">
<button class="bg-red-500 text-white px-2 py-1 rounded">Delete</button>
</form>
</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>
</body>
</html>
